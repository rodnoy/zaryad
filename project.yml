name: ChargerMonitor
options:
  bundleIdPrefix: com.worldproject
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: false
  minimumXcodeGenVersion: "2.35.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  ChargerMonitor:
    type: application
    platform: macOS
    sources:
      - path: Sources
        type: group
      - path: Resources
        type: group
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.worldproject.chargermonitor
        PRODUCT_NAME: "Charger Monitor"
        INFOPLIST_GENERATION_MODE: GeneratedFile
        INFOPLIST_KEY_CFBundleDisplayName: "Charger Monitor"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.utilities"
        INFOPLIST_KEY_NSMainNibFile: ""
        CODE_SIGN_ENTITLEMENTS: ChargerMonitor.entitlements
        ENABLE_APP_SANDBOX: "NO"
        SWIFT_EMIT_LOC_STRINGS: "YES"
        GENERATE_INFOPLIST_FILE: "YES"
    dependencies:
      - sdk: IOKit.framework
      - sdk: SwiftData.framework

  ChargerMonitorTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/ChargerMonitorTests
        type: group
    dependencies:
      - target: ChargerMonitor
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.worldproject.chargermonitor.tests
        GENERATE_INFOPLIST_FILE: "YES"
