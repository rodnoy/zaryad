name: ChargerMonitor
options:
  bundleIdPrefix: com.worldproject
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: false
  minimumXcodeGenVersion: "2.35.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  Domain:
    type: library.static
    platform: macOS
    sources:
      - path: Sources/Domain
        type: group

  Data:
    type: library.static
    platform: macOS
    sources:
      - path: Sources/Data
        type: group
    dependencies:
      - target: Domain
      - sdk: IOKit.framework
      - sdk: SwiftData.framework

  Presentation:
    type: library.static
    platform: macOS
    sources:
      - path: Sources/Presentation
        type: group
    dependencies:
      - target: Domain
      - target: Data

  ChargerMonitor:
    type: application
    platform: macOS
    sources:
      - path: Sources/App
        type: group
      - path: Resources
        type: group
        buildPhase: resources
        excludes:
          - Themes
      - path: Resources/Themes
        type: group
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.worldproject.chargermonitor
        PRODUCT_NAME: "Charger Monitor"
        INFOPLIST_GENERATION_MODE: GeneratedFile
        INFOPLIST_KEY_CFBundleDisplayName: "Charger Monitor"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.utilities"
        INFOPLIST_KEY_NSMainNibFile: ""
        CODE_SIGN_ENTITLEMENTS: ChargerMonitor.entitlements
        ENABLE_APP_SANDBOX: "NO"
        SWIFT_EMIT_LOC_STRINGS: "YES"
        GENERATE_INFOPLIST_FILE: "YES"
        PRODUCT_MODULE_NAME: ChargerMonitor
    dependencies:
      - target: Domain
      - target: Data
      - target: Presentation
      - sdk: IOKit.framework
      - sdk: SwiftData.framework

  ChargerMonitorTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/ChargerMonitorTests
        type: group
    dependencies:
      - target: ChargerMonitor
      - target: Domain
      - target: Data
      - target: Presentation
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.worldproject.chargermonitor.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Charger Monitor.app/Contents/MacOS/Charger Monitor"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  ChargerMonitor:
    build:
      targets:
        ChargerMonitor: all
    test:
      targets:
        - ChargerMonitorTests
